# OMP / Oh My Pi — recommended MiMo Omni snippet
# Merge under `providers:` in ~/.omp/agent/models.yml
# Set default role in ~/.omp/agent/config.yml:
#   modelRoles:
#     default: vllm-spark1/MiMo-V2.5-NVFP4

  vllm-spark1:
    baseUrl: http://spark1-cx7:8888/v1   # or http://10.0.0.1:8888/v1
    apiKey: dummy
    api: openai-completions
    auth: none
    models:
      - id: MiMo-V2.5-NVFP4
        name: MiMo-V2.5 Omni NVFP4 (TP2 / 1M / MTP1)
        reasoning: false
        input: [text, image, video, audio]
        contextWindow: 1000000
        maxTokens: 32768
        # pi-only: params {temperature: 0, top_p: 0.95, repetition_penalty: 1.08, chat_template_kwargs {enable_thinking: false}}

  mimo-local:
    baseUrl: http://localhost:8888/v1
    apiKey: local
    api: openai-completions
    auth: none
    models:
      - id: MiMo-V2.5-NVFP4
        name: MiMo-V2.5 Omni NVFP4 Local
        reasoning: false
        input: [text, image, video, audio]
        contextWindow: 1000000
        maxTokens: 32768
        # pi-only: params {temperature: 0, top_p: 0.95, repetition_penalty: 1.08, chat_template_kwargs {enable_thinking: false}}
